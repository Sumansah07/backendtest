[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "@supabase/supabase-js", "bcrypt", "cloudinary", "cors", "jsonwebtoken", "multer", "stripe", "validator"]
